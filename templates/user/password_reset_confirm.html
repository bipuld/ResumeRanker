<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeRanker | Reset Password</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eef4fb 0%, #e3edf8 100%);
            color: #0f172a;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid #d7e2ef;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }
        .brand {
            text-align: center;
            margin-bottom: 22px;
        }
        .brand-mark {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 100%);
            color: #ffffff;
            font-weight: 700;
            display: grid;
            place-items: center;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }
        .sub {
            margin-top: 6px;
            font-size: 14px;
            color: #475569;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin: 14px 0 6px;
            color: #0f172a;
        }
        input[type="password"] {
            width: 100%;
            height: 44px;
            border: 1px solid #c8d4e3;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 14px;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
        }
        .btn {
            margin-top: 18px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            height: 44px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 100%);
        }
        .alert {
            margin-top: 14px;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 13px;
            line-height: 1.5;
        }
        .alert.error {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #9f1239;
        }
        .alert.success {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">
            <div class="brand-mark">RR</div>
            <h1>Reset your password</h1>
            <div class="sub">Create a new password for your ResumeRanker account.</div>
        </div>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert success">{{ success }}</div>
        {% endif %}

        {% if not success %}
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="uid" value="{{ uid }}">
                <input type="hidden" name="token" value="{{ token }}">

                <label for="new_password">New password</label>
                <input id="new_password" name="new_password" type="password" required minlength="8">

                <label for="confirm_password">Confirm password</label>
                <input id="confirm_password" name="confirm_password" type="password" required minlength="8">

                <button class="btn" type="submit">Update password</button>
            </form>
        {% endif %}
    </main>
</body>
</html>
